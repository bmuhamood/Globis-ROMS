Updated = services:
  - type: web
    name: globis-hr
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn globis_hr.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: RENDER
        value: True
      - key: DATABASE_URL
        fromDatabase:
          name: globis-hr-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        value: globis
      - key: DJANGO_SUPERUSER_EMAIL
        value: globishrsolutionug@gmail.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: Hussein2019.,
      - key: PYTHON_VERSION
        value: 3.11.0
    # These are separate top-level keys, not part of envVars
    releaseCommand: python manage.py migrate

databases:
  - name: globis-hr-db
    databaseName: globis
    user: globis