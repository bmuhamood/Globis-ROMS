services:
  - type: web
    name: globis-hr
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn globis_hr.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: RENDER
        value: True
      - key: DATABASE_URL
        fromDatabase:
          name: globis-hr-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: globis-hr-db
    databaseName: globis_hr
    user: globis_hr_user