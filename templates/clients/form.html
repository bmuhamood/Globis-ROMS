{% extends 'base.html' %}

{% block content %}
<div class="row mt-4">
    <div class="col-12">
        <h2 class="text-secondary">
            <i class="fas fa-building me-2"></i>
            {% if client %}Edit Client{% else %}Add New Client{% endif %}
        </h2>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-8 mx-auto">
        <div class="card shadow">
            <div class="card-header" style="background: linear-gradient(135deg, #0184FC, #00016E); color: white;">
                <h5 class="mb-0">Client Information</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="company_name" class="form-label">Company Name *</label>
                            <input type="text" class="form-control" id="company_name" name="company_name" 
                                   value="{{ client.company_name|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="contact_person" class="form-label">Contact Person *</label>
                            <input type="text" class="form-control" id="contact_person" name="contact_person" 
                                   value="{{ client.contact_person|default:'' }}" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   value="{{ client.email|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Phone *</label>
                            <input type="text" class="form-control" id="phone" name="phone" 
                                   value="{{ client.phone|default:'' }}" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="address" class="form-label">Address</label>
                            <textarea class="form-control" id="address" name="address" rows="3">{{ client.address|default:'' }}</textarea>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="country" class="form-label">Country *</label>
                            <input type="text" class="form-control" id="country" name="country" 
                                   value="{{ client.country|default:'' }}" required>
                        </div>
                    </div>
                    
                    <div class="text-end">
                        <a href="{% url 'client_list' %}" class="btn btn-secondary me-2">Cancel</a>
                        {% if perms.clients.add_client or perms.clients.change_client or is_admin %}
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Save Client
                        </button>
                        {% endif %}
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
