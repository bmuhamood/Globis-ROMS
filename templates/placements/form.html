{% extends 'base.html' %}

{% block content %}
<div class="row mt-4">
    <div class="col-12">
        <h2 class="text-secondary">
            <i class="fas fa-briefcase me-2"></i>
            {% if placement %}Edit Placement{% else %}New Placement{% endif %}
        </h2>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-8 mx-auto">
        <div class="card shadow">
            <div class="card-header" style="background: linear-gradient(135deg, #0184FC, #00016E); color: white;">
                <h5 class="mb-0">Placement Details</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="candidate" class="form-label">Candidate *</label>
                            <select class="form-select" id="candidate" name="candidate" required>
                                <option value="">Select Candidate</option>
                                {% for candidate in candidates %}
                                <option value="{{ candidate.id }}" {% if placement.candidate_id == candidate.id %}selected{% endif %}>
                                    {{ candidate.full_name }} - {{ candidate.passport_no }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="client" class="form-label">Client *</label>
                            <select class="form-select" id="client" name="client" required>
                                <option value="">Select Client</option>
                                {% for client in clients %}
                                <option value="{{ client.id }}" {% if placement.client_id == client.id %}selected{% endif %}>
                                    {{ client.company_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="placement_fee" class="form-label">Placement Fee (UGX) *</label>
                            <input type="number" step="0.01" class="form-control" id="placement_fee" name="placement_fee" 
                                   value="{{ placement.placement_fee|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="date_placed" class="form-label">Placement Date *</label>
                            <input type="date" class="form-control" id="date_placed" name="date_placed" 
                                   value="{{ placement.date_placed|date:'Y-m-d'|default:'' }}" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="payment_status" class="form-label">Payment Status *</label>
                            <select class="form-select" id="payment_status" name="payment_status" required>
                                <option value="pending" {% if placement.payment_status == 'pending' %}selected{% endif %}>Pending</option>
                                <option value="partial" {% if placement.payment_status == 'partial' %}selected{% endif %}>Partially Paid</option>
                                <option value="paid" {% if placement.payment_status == 'paid' %}selected{% endif %}>Paid</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3">{{ placement.notes|default:'' }}</textarea>
                        </div>
                    </div>
                    
                    <div class="text-end">
                        <a href="{% url 'placement_list' %}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Save Placement
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
