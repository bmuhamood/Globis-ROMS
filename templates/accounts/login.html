{% extends 'base.html' %}

{% block login_content %}
<div style="min-height: 100vh; background: linear-gradient(135deg, #0184FC, #00016E); display: flex; align-items: center; justify-content: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card" style="border-radius: 15px; overflow: hidden; animation: slideIn 0.5s;">
                    <div class="card-header text-center py-4" style="background: linear-gradient(135deg, #0184FC, #00016E); color: white;">
                        <h3 class="mb-0"><i class="fas fa-users me-2"></i>Globis HR Solutions Uganda</h3>
                        <p class="mb-0">Recruitment Operations Management System</p>
                    </div>
                    <div class="card-body p-5">
                        <form method="POST" action="{% url 'login' %}">
                            {% csrf_token %}
                            
                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                            
                            <div class="mb-4">
                                <label for="username" class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" id="username" name="username" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>
                            </div>
                            
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-2">
                                <i class="fas fa-sign-in-alt me-2"></i>Login
                            </button>
                        </form>
                    </div>
                    <div class="card-footer text-center py-3">
                        <small class="text-muted">© 2024 Globis HR Solutions Uganda. All rights reserved.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes slideIn {
        from {
            transform: translateY(-50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
</style>
{% endblock %}
