{% extends 'base.html' %}

{% block login_content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globis HR - ROMS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0184FC 0%, #00016E 100%);
        }

        /* Subtle animated background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.2"><path d="M20,20 L30,20 L25,30 Z" fill="white"/><circle cx="70" cy="30" r="5" fill="white"/><rect x="60" y="60" width="15" height="15" fill="white"/><path d="M15,80 Q25,70 35,80" stroke="white" fill="none" stroke-width="2"/></svg>');
            background-size: 100px 100px;
            animation: move 60s linear infinite;
        }

        @keyframes move {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* Main container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            z-index: 2;
        }

        /* Compact card */
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 400px;
            max-width: 100%;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Compact header */
        .login-header {
            background: linear-gradient(135deg, #0184FC, #00016E);
            padding: 1.5rem;
            text-align: center;
            position: relative;
        }

        .logo-wrapper {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.8rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .logo-wrapper i {
            font-size: 2rem;
            background: linear-gradient(135deg, #0184FC, #00016E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header h3 {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .login-header p {
            color: rgba(255,255,255,0.9);
            font-size: 0.8rem;
        }

        /* Compact body */
        .login-body {
            padding: 1.8rem;
        }

        /* Form groups */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            color: #4a5568;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: #0184FC;
            font-size: 0.9rem;
            z-index: 2;
        }

        .form-control {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.5rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: #0184FC;
            background: white;
            box-shadow: 0 0 0 3px rgba(1, 132, 252, 0.1);
        }

        /* Password toggle */
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.2rem;
            transition: all 0.2s;
            z-index: 3;
        }

        .password-toggle:hover {
            color: #0184FC;
        }

        /* Options row */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1.2rem 0;
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .remember-checkbox input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: #0184FC;
        }

        .remember-checkbox span {
            color: #64748b;
            font-size: 0.85rem;
        }

        .forgot-link {
            color: #0184FC;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #00016E;
            text-decoration: underline;
        }

        /* Login button */
        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #0184FC, #00016E);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(1, 132, 252, 0.2);
        }

        .login-btn i {
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .login-btn:hover i {
            transform: translateX(4px);
        }

        /* Alert */
        .alert {
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fee2e2;
            border-left: 3px solid #ef4444;
            color: #b91c1c;
        }

        .alert i {
            margin-right: 0.5rem;
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            color: currentColor;
        }

        .btn-close:hover {
            opacity: 1;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            padding: 1.2rem;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        .login-footer small {
            color: #94a3b8;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper">
                    <i class="fas fa-users"></i>
                </div>
                <h3>Globis HR Solutions</h3>
                <p>Recruitment Operations Management System</p>
            </div>
            
            <div class="login-body">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert">
                            <div>
                                <i class="fas fa-exclamation-circle"></i>
                                {{ message }}
                            </div>
                            <button type="button" class="btn-close" data-bs-dismiss="alert">×</button>
                        </div>
                    {% endfor %}
                {% endif %}
                
                <form method="POST" action="{% url 'login' %}" id="loginForm">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user me-1"></i>Username
                        </label>
                        <div class="input-wrapper">
                            <span class="input-icon"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" name="username" 
                                   placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-lock me-1"></i>Password
                        </label>
                        <div class="input-wrapper">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Enter password" required>
                            <button type="button" class="password-toggle" id="togglePassword">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-checkbox">
                            <input type="checkbox" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot?</a>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <span>Sign In</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>
            
            <div class="login-footer">
                <small>© 2025 Globis HR Solutions Uganda</small>
            </div>
        </div>
    </div>

    <script>
        // Password toggle
        document.getElementById('togglePassword')?.addEventListener('click', function() {
            const password = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Auto-hide alerts
        setTimeout(() => {
            document.querySelectorAll('.alert').forEach(alert => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 300);
            });
        }, 4000);
    </script>
</body>
</html>
{% endblock %}
